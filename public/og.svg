<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Open Graph card. 1200×630 = canonical OG dimensions; reads well at the
    640×335 thumbnail size that LinkedIn / X show. SVG-as-OG works on
    most modern crawlers; for stragglers we keep the rendered text legible
    even if the SVG renders as the default thumbnail.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#11141A"/>
      <stop offset="100%" stop-color="#0A0B0E"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="1.1" fill="#4D8FBF" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="60" width="1080" height="510" fill="url(#dots)"/>

  <!-- Top trim: mono pretitle -->
  <text x="80" y="120" font-family="ui-monospace, SFMono-Regular, monospace"
        font-size="18" letter-spacing="3" fill="#9B9385">
    BACHSCHUSTER ARCHITEKTUR · INGOLSTADT · SHANGHAI · JOHANNESBURG · LINZ
  </text>

  <!-- Main display headline (German, italic for the second half) -->
  <text x="80" y="280" font-family="Fraunces, Georgia, serif"
        font-size="100" font-weight="400" fill="#F2EDE2" letter-spacing="-2">
    Vor dem Gebäude,
  </text>
  <text x="80" y="400" font-family="Fraunces, Georgia, serif"
        font-size="100" font-style="italic" font-weight="400"
        fill="#D97648" letter-spacing="-2">
    das System.
  </text>

  <!-- Bottom strip: pretitle + Strukturplanung mark -->
  <line x1="80" y1="490" x2="1120" y2="490" stroke="#1E232C" stroke-width="1"/>
  <text x="80" y="530" font-family="ui-monospace, SFMono-Regular, monospace"
        font-size="16" letter-spacing="2.5" fill="#9B9385">
    STRUKTURPLANUNG · METHODE VOR ARCHITEKTUR · SEIT 1993
  </text>

  <!-- Right-side brand mark mirrors favicon.svg -->
  <g transform="translate(1000 100)">
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#F2EDE2" stroke-width="3"/>
    <circle cx="50" cy="50" r="20" fill="#B85C2E"/>
    <circle cx="50" cy="50" r="6" fill="#0A0B0E"/>
  </g>
</svg>
